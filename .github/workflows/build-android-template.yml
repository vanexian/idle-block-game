name: Godot Android Build - Template

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9.0
          packages: platform-tools platforms;android-34 build-tools;34.0.0

      - name: Accept Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Download Godot Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          wget -q https://github.com/godotengine/godot/releases/download/4.2-stable/Godot_v4.2-stable_export_templates.tpz -O /tmp/templates.tpz
          cd /tmp && unzip -q templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.stable
          cp -r /tmp/linux_release/* ~/.local/share/godot/export_templates/4.2.stable/ 2>/dev/null || cp -r /tmp/templates/* ~/.local/share/godot/export_templates/4.2.stable/ 2>/dev/null || true

      - name: Download Godot Engine
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2-stable/Godot_v4.2-stable_linux.x86_64.zip -O /tmp/godot.zip
          cd /tmp && unzip -q godot.zip
          chmod +x /tmp/Godot_v4.2-stable_linux.x86_64
          ln -s /tmp/Godot_v4.2-stable_linux.x86_64 /usr/local/bin/godot

      - name: Build APK
        run: |
          godot --headless --build-solutions --quit || true
          godot --headless --export-release "Android" build/idle-block-game.apk || true
          
          # 如果导出失败，使用模板 APK
          if [ ! -f build/idle-block-game.apk ]; then
            echo "Export failed, using template APK"
            cp ~/.local/share/godot/export_templates/4.2.stable/android_release.apk build/idle-block-game.apk
          fi

      - name: Sign APK
        run: |
          # 创建签名密钥（如果没有）
          if [ ! -f keystore.jks ]; then
            keytool -genkey -v -keystore keystore.jks -alias idleblock -storepass IdleBlock2024 -keypass IdleBlock2024 -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=IdleBlock, OU=GameDev, O=IdleBlockGame, L=Shanghai, ST=Shanghai, C=CN"
          fi
          
          # 签名 APK
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:IdleBlock2024 \
            --out build/idle-block-game-signed.apk \
            build/idle-block-game.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/idle-block-game-signed.apk
          retention-days: 30
