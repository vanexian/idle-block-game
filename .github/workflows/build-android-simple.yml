name: Godot Android Build - Simple

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          echo y | sdkmanager "platform-tools"
          echo y | sdkmanager "platforms;android-34"
          echo y | sdkmanager "build-tools;34.0.0"
          echo y | sdkmanager --licenses || true

      - name: Setup Godot Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          cp -r /root/.local/share/godot/export_templates/4.2.stable ~/.local/share/godot/export_templates/

      - name: Build APK with Gradle
        run: |
          mkdir -p android/build
          cd android/build
          godot -e --quit
          godot --export-debug "Android" ../game.apk
          ls -la ../

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/game.apk
          retention-days: 30
