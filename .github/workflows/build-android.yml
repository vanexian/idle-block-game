name: Godot Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Android
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          echo y | sdkmanager "platform-tools"
          echo y | sdkmanager "platforms;android-34"
          echo y | sdkmanager "build-tools;34.0.0"

      - name: Accept Android Licenses
        run: |
          echo y | sdkmanager --licenses || true

      - name: Install Xvfb and X11 libs
        run: |
          apt-get update -qq
          apt-get install -y -qq xvfb libxcursor1 libxrandr2 libxi6 libxinerama1 libxkbcommon0 libpulse0 libasound2 libgl1-mesa-glx libglu1-mesa libdbus-1-3

      - name: Import project
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          cp -r /root/.local/share/godot/export_templates/4.2.stable ~/.local/share/godot/export_templates/

      - name: Build Android APK
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          export PULSE_SERVER=disabled
          sleep 2
          godot --rendering-driver opengl3 --audio-driver Dummy --headless --build-solutions --quit
          godot --rendering-driver opengl3 --audio-driver Dummy --headless --export-release "Android" build/idle-block-game.apk
        working-directory: ${{ github.workspace }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ github.workspace }}/build/idle-block-game.apk
          retention-days: 30
